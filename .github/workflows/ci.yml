name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
          cache-dependency-path: app/yarn.lock

      - name: Install dependencies
        working-directory: app
        run: yarn

      - name: Lint
        working-directory: app
        run: yarn lint

      - name: Tests
        working-directory: app
        run: yarn test --watchAll=false

      - name: Build
        working-directory: app
        run: yarn build